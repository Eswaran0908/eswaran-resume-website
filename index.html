<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | My Resume</title>
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="welcome-wrapper">
        <div class="welcome-card">

            <!-- Left Side -->
            <div class="left-section">
                <img src="profile.jpg" alt="Profile Image" class="profile-pic">

                <div class="social-icons">
                    <a href="https://www.linkedin.com/in/eswaran0908/" target="_blank" class="linkedin">
                        <i class="fab fa-linkedin"></i>
                    </a>

                    <a href="https://github.com/Eswaran0908" target="_blank" class="github">
                        <i class="fab fa-github"></i>
                    </a>

                    <a href="mailto:eswaranraja555@gmail.com" class="email">
                        <i class="fas fa-envelope"></i>
                    </a>

                    <a href="https://wa.me/916361232640" target="_blank" class="whatsapp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>

            <!-- Right Side -->
            <div class="right-section">
                <h2>Welcome to My Profile</h2>
                <h1 id="welcomeText"></h1>

                <p class="subtitle">
                    💻 Passionate Full Stack Developer
                </p>

                <button class="resume-btn" onclick="goToHome()" id="animatedBtn">
                    <i class="fas fa-file-alt"></i> Open My Resume
                </button>
            </div>

        </div>
    </div>

    <script>
        function goToHome() {
            window.location.href = "home.html";
        }

        const headingText = "✨ Welcome to My Resume – I'm ESWARAN ✨";
        let headingIndex = 0;
        const heading = document.getElementById("welcomeText");

        function typeHeadingText() {
            if (headingIndex < headingText.length) {
                heading.innerHTML += headingText.charAt(headingIndex);
                headingIndex++;
                setTimeout(typeHeadingText, 60);
            }
        }

        window.onload = function () {
            typeHeadingText();
        };
    </script>

</body>
</html>
